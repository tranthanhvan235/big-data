services:
  minio1:
    image: quay.io/minio/minio:latest
    hostname: minio1
    ports:
      - "9101:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=root
      - MINIO_ROOT_PASSWORD=123123123
    volumes:
      - "./minio/data1:/data"
    command: server http://minio{1...3}/data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - minio-net

  minio2:
    image: quay.io/minio/minio:latest
    hostname: minio2
    ports:
      - "9102:9000"
      - "9002:9001"
    environment:
      - MINIO_ROOT_USER=root
      - MINIO_ROOT_PASSWORD=123123123
    volumes:
      - "./minio/data2:/data"
    command: server http://minio{1...3}/data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - minio-net

  minio3:
    image: quay.io/minio/minio:latest
    hostname: minio3
    ports:
      - "9103:9000"
      - "9003:9001"
    environment:
      - MINIO_ROOT_USER=root
      - MINIO_ROOT_PASSWORD=123123123
    volumes:
      - "./minio/data3:/data"
    command: server http://minio{1...3}/data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - minio-net

  nginx:
    image: nginx:alpine
    hostname: nginx
    ports:
      - "9090:9000"
      - "9091:9091"
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf:ro"
    depends_on:
      - minio1
      - minio2
      - minio3
    networks:
      - minio-net

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - MINIO_ENDPOINT=nginx:9000
      - MINIO_ACCESS_KEY=root
      - MINIO_SECRET_KEY=123123123
      - MINIO_SECURE=false
    depends_on:
      - nginx
    networks:
      - minio-net

networks:
  minio-net:
    driver: bridge
